<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Dashboard</title>
    <link rel="stylesheet" href="/app.css?v=11" />
  </head>
  <body>
    <main class="shell">
      <section id="loginView" class="login-view" hidden>
        <form id="loginForm" class="login-panel">
          <div>
            <p class="kicker">Hermes</p>
            <h1>家庭与市场指标</h1>
          </div>
          <label>
            <span>访问密码</span>
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">登录</button>
          <p id="loginError" class="error" role="alert"></p>
        </form>
      </section>

      <section id="dashboardView" class="dashboard" hidden>
        <header class="topbar">
          <div>
            <p class="kicker">Hermes</p>
            <h1>实时指标</h1>
          </div>
          <div class="top-actions">
            <div class="view-tabs" role="group" aria-label="页面">
              <button id="metricsTab" class="active" type="button">指标</button>
              <button id="configTab" type="button">配置</button>
              <button id="passwordTab" type="button">密码</button>
            </div>
            <button id="logoutButton" class="ghost" type="button">退出</button>
          </div>
        </header>

        <section id="metricsPanel">
          <div class="metrics-toolbar">
            <p id="metricsRefreshStatus" class="refresh-status" role="status"></p>
            <button id="refreshMetricsButton" class="ghost" type="button">刷新</button>
          </div>
          <section id="pinnedSection" class="metric-section" hidden>
            <div class="metric-section-head">
              <div>
                <p class="kicker">Pinned</p>
                <h2>置顶指标</h2>
              </div>
            </div>
            <div id="pinnedGrid" class="metric-grid top-grid" aria-live="polite"></div>
          </section>
          <section id="metricGroups" class="metric-groups" aria-live="polite"></section>
        </section>

        <section id="configPanel" class="config-panel" hidden>
          <aside class="source-list">
            <div class="section-head">
              <div>
                <p class="kicker">Sources</p>
                <h2>定时任务</h2>
              </div>
              <button id="newSourceButton" type="button">新增</button>
            </div>
            <div id="sourceList"></div>
          </aside>

          <form id="sourceForm" class="source-form">
            <div class="section-head">
              <div>
                <p class="kicker">Tracking</p>
                <h2>关注数据</h2>
              </div>
              <div class="form-actions">
                <button id="deleteSourceButton" class="ghost danger" type="button">删除</button>
                <button id="scanButton" class="ghost" type="button">立即扫描</button>
                <button type="submit">保存</button>
              </div>
            </div>

            <div class="form-grid">
              <label>
                <span>任务 ID</span>
                <input id="sourceId" name="id" required />
              </label>
              <label>
                <span>名称</span>
                <input id="sourceName" name="name" required />
              </label>
              <label class="wide">
                <span>输出目录</span>
                <input id="sourceDir" name="output_dir" placeholder="~/.hermes/cron/output/..." required />
              </label>
              <label>
                <span>文件匹配</span>
                <input id="sourceGlob" name="file_glob" value="*.md" required />
              </label>
              <label>
                <span>调度说明</span>
                <input id="sourceSchedule" name="schedule" placeholder="18:30 每日" />
              </label>
              <label class="check-row">
                <input id="sourceEnabled" name="enabled" type="checkbox" checked />
                <span>启用</span>
              </label>
            </div>

            <div class="rules-head">
              <div>
                <p class="kicker">Rules</p>
                <h3>提取规则</h3>
              </div>
              <button id="addRuleButton" class="ghost" type="button">添加规则</button>
            </div>
            <div id="rulesList" class="rules-list"></div>
            <p id="configMessage" class="config-message" role="status"></p>
          </form>
        </section>

        <section id="passwordPanel" class="password-panel" hidden>
          <form id="passwordForm" class="password-form">
            <div class="section-head">
              <div>
                <p class="kicker">Security</p>
                <h2>修改登录密码</h2>
              </div>
            </div>
            <div class="form-grid">
              <label class="wide">
                <span>当前密码</span>
                <input id="currentPassword" type="password" autocomplete="current-password" required />
              </label>
              <label>
                <span>新密码</span>
                <input id="newPassword" type="password" autocomplete="new-password" minlength="8" required />
              </label>
              <label>
                <span>确认新密码</span>
                <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
              </label>
            </div>
            <div class="form-actions">
              <button type="submit">保存新密码</button>
            </div>
            <p id="passwordMessage" class="config-message" role="status"></p>
          </form>
        </section>
      </section>
    </main>

    <div id="historyModal" class="modal-backdrop" hidden>
      <section class="history-modal" role="dialog" aria-modal="true" aria-labelledby="modalChartTitle">
        <div class="trend-head">
          <div>
            <p class="kicker">History</p>
            <h2 id="modalChartTitle">历史趋势</h2>
          </div>
          <div class="controls">
            <div class="range-tabs" role="group" aria-label="时间范围">
              <button data-modal-range="30" class="active">30天</button>
              <button data-modal-range="180">半年</button>
              <button data-modal-range="all">所有</button>
            </div>
            <button id="closeHistoryButton" class="ghost" type="button">关闭</button>
          </div>
        </div>
        <canvas id="trendCanvas" width="1200" height="460"></canvas>
        <p id="emptyState" class="empty-state" hidden>暂无历史数据</p>
      </section>
    </div>

    <script src="/app.js?v=11"></script>
  </body>
</html>
